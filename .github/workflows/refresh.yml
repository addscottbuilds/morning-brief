name: Daily data refresh

on:
  schedule:
    # ~05:45 Melbourne in winter (AEST, UTC+10) / ~06:45 in summer (AEDT, UTC+11)
    - cron: "45 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build data.json
        run: node scripts/build-data.mjs
        env:
          # Optional: add this repo secret to get AI-written neutral summaries
          # and narrative-divergence analysis. Without it the digest still
          # ships with clustered headlines grouped by outlet lean.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit and push
        run: |
          git config user.name "morning-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/data.json
          git diff --cached --quiet || git commit -m "Daily data refresh"
          git push

name: Daily data refresh

on:
  schedule:
    # Nominally 05:23 Melbourne (AEST) / 06:23 (AEDT). GitHub crons fire late
    # under load (often 15-90 min), so this is deliberately early and on an
    # odd minute to dodge the congested :00/:15/:30/:45 slots. The push job
    # below waits until 6:00 Melbourne regardless of when this starts.
    - cron: "23 19 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Build data.json
        run: node scripts/build-data.mjs
        env:
          # Optional: add this repo secret to get AI-written neutral summaries
          # and narrative-divergence analysis. Without it the digest still
          # ships with clustered headlines grouped by outlet lean.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Commit and push
        run: |
          git config user.name "morning-brief-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/data.json
          git diff --cached --quiet || git commit -m "Daily data refresh"
          git push

  # Deploy from this workflow directly — commits made with GITHUB_TOKEN don't
  # trigger the push-based deploy workflow, and this skips the shared queue.
  deploy:
    needs: refresh
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4

  # Send the morning notification AFTER the fresh data is deployed, holding
  # until exactly 6:00am Melbourne when the pipeline ran early.
  push:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - name: Wait until 6:00am Melbourne
        run: |
          now=$(date +%s)
          target=$(TZ=Australia/Melbourne date -d "$(TZ=Australia/Melbourne date +%F) 06:00" +%s)
          wait=$(( target - now ))
          if [ "$wait" -gt 3600 ]; then wait=3600; fi
          if [ "$wait" -gt 0 ]; then
            echo "sleeping ${wait}s until 6:00 Melbourne"
            sleep "$wait"
          else
            echo "already past 6:00 Melbourne — sending now"
          fi
      - name: Send push
        run: node scripts/send-push.mjs
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          PUSH_SUBSCRIPTION: ${{ secrets.PUSH_SUBSCRIPTION }}
